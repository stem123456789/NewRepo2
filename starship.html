<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Smasher: Dodge Storm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            background-color: #0b0314;
            color: #f3ecf8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .header {
            text-align: center;
            margin-bottom: 15px;
        }
        h1 {
            color: #ff007f;
            text-shadow: 0 0 10px #ff007f;
            font-size: 2rem;
            margin-bottom: 5px;
        }
        canvas {
            background: #05010a;
            border: 4px solid #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            display: block;
            border-radius: 4px;
        }
        .controls {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #b19fcd;
            text-align: center;
            line-height: 1.4;
        }
        .back-btn {
            margin-top: 20px;
            display: inline-block;
            background-color: #ff007f;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            box-shadow: 0 0 10px #ff007f;
            transition: transform 0.2s;
        }
        .back-btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>STAR SMASHER</h1>
        <p>Time Survived: <span id="scoreDisplay">0s</span></p>
    </div>

    <!-- The Game Screen -->
    <canvas id="spaceCanvas" width="400" height="500"></canvas>

    <div class="controls">
        Use <strong>A / D</strong> or <strong>Left / Right Arrows</strong> to dodge.<br>
        Lasers are offline! Survive the asteroid storm.
    </div>

    <a href="index.html" class="back-btn">⬅ Back to Arcade</a>

    <script>
        const canvas = document.getElementById("spaceCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("scoreDisplay");

        let score = 0;
        let keys = {};
        let frameCount = 0;

        // Player Ship configuration
        const player = {
            x: canvas.width / 2 - 15,
            y: canvas.height - 60,
            width: 30,
            height: 30,
            speed: 6
        };

        // Obstacle Tracking
        let asteroids = [];
        let asteroidSpawnRate = 25; // Spawns an asteroid every X frames
        let baseSpeedMultiplier = 1.0;

        // Keyboard Event Listeners
        window.addEventListener("keydown", e => { keys[e.key] = true; });
        window.addEventListener("keyup", e => { keys[e.key] = false; });

        function spawnAsteroid() {
            const size = Math.random() * 25 + 15; // Random sizes
            asteroids.push({
                x: Math.random() * (canvas.width - size),
                y: -size,
                width: size,
                height: size,
                // Asteroids drop faster as you survive longer
                speed: (Math.random() * 3 + 2) * baseSpeedMultiplier,
                color: Math.random() > 0.5 ? "#7000ff" : "#ff007f"
            });
        }

        // Standard dynamic hitbox checker
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // Core Game Engine loop
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            frameCount++;

            // Increment survival score every 60 frames (roughly 1 second)
            if (frameCount % 60 === 0) {
                score++;
                scoreDisplay.textContent = score + "s";
                
                // Ramp up the difficulty over time
                if (score % 5 === 0) {
                    baseSpeedMultiplier += 0.15; // Asteroids fall faster
                    if (asteroidSpawnRate > 8) asteroidSpawnRate -= 2; // Spawns increase
                }
            }

            // Handle horizontal movement controls
            if ((keys["ArrowLeft"] || keys["a"]) && player.x > 0) player.x -= player.speed;
            if ((keys["ArrowRight"] || keys["d"]) && player.x < canvas.width - player.width) player.x += player.speed;

            // Draw Fighter Ship (Sleek Cyan Triangle style)
            ctx.fillStyle = "#00ffff";
            ctx.beginPath();
            ctx.moveTo(player.x + player.width / 2, player.y);
            ctx.lineTo(player.x, player.y + player.height);
            ctx.lineTo(player.x + player.width, player.y + player.height);
            ctx.closePath();
            ctx.fill();

            // Handle spawning target asteroids
            if (frameCount % asteroidSpawnRate === 0) {
                spawnAsteroid();
            }

            // Move and draw asteroids
            asteroids.forEach((ast, aIndex) => {
                ast.y += ast.speed;

                // Remove out-of-bounds asteroids safely
                if (ast.y > canvas.height) {
                    asteroids.splice(aIndex, 1);
                    return;
                }

                // Draw asteroid block
                ctx.fillStyle = ast.color;
                ctx.fillRect(ast.x, ast.y, ast.width, ast.height);

                // Asteroid colliding directly into user ship = Game Over
                if (checkCollision(player, ast)) {
                    alert("💥 CRASH! You survived for " + score + " seconds.");
                    document.location.reload();
                }
            });

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
