<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Smasher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            background-color: #0b0314;
            color: #f3ecf8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .header {
            text-align: center;
            margin-bottom: 15px;
        }
        h1 {
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
            font-size: 2rem;
            margin-bottom: 5px;
        }
        canvas {
            background: #05010a;
            border: 4px solid #ff007f;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.5);
            display: block;
            border-radius: 4px;
        }
        .controls {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #b19fcd;
            text-align: center;
            line-height: 1.4;
        }
        .back-btn {
            margin-top: 20px;
            display: inline-block;
            background-color: #ff007f;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            box-shadow: 0 0 10px #ff007f;
            transition: transform 0.2s;
        }
        .back-btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>STAR SMASHER</h1>
        <p>Asteroids Smashed: <span id="scoreDisplay">0</span></p>
    </div>

    <!-- The Game Screen -->
    <canvas id="spaceCanvas" width="400" height="500"></canvas>

    <div class="controls">
        Use <strong>A / D</strong> or <strong>Left / Right Arrows</strong> to move.<br>
        Press <strong>SPACEBAR</strong> to fire laser cannons!
    </div>

    <a href="index.html" class="back-btn">⬅ Back to Arcade</a>

    <script>
        const canvas = document.getElementById("spaceCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("scoreDisplay");

        let score = 0;
        let keys = {};

        // Player Ship configuration
        const player = {
            x: canvas.width / 2 - 15,
            y: canvas.height - 50,
            width: 30,
            height: 30,
            speed: 5
        };

        // Projectile Arrays
        let lasers = [];
        let asteroids = [];
        let asteroidSpawnTimer = 0;

        // Keyboard Event Listeners
        window.addEventListener("keydown", e => { keys[e.key] = true; });
        window.addEventListener("keyup", e => { 
            keys[e.key] = false; 
            if (e.key === " " || e.key === "Spacebar") {
                fireLaser();
            }
        });

        function fireLaser() {
            lasers.push({
                x: player.x + player.width / 2 - 2,
                y: player.y,
                width: 4,
                height: 12,
                speed: 7
            });
        }

        function spawnAsteroid() {
            const size = Math.random() * 20 + 15;
            asteroids.push({
                x: Math.random() * (canvas.width - size),
                y: -size,
                width: size,
                height: size,
                speed: Math.random() * 2 + 1.5
            });
        }

        // Standard dynamic hitbox checker
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // Core Game Engine loop
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Handle horizontal controls
            if ((keys["ArrowLeft"] || keys["a"]) && player.x > 0) player.x -= player.speed;
            if ((keys["ArrowRight"] || keys["d"]) && player.x < canvas.width - player.width) player.x += player.speed;

            // Draw Fighter Ship (Triangle styling)
            ctx.fillStyle = "#00ffff";
            ctx.beginPath();
            ctx.moveTo(player.x + player.width / 2, player.y);
            ctx.lineTo(player.x, player.y + player.height);
            ctx.lineTo(player.x + player.width, player.y + player.height);
            ctx.closePath();
            ctx.fill();

            // Handle lasers firing up the screen
            lasers.forEach((laser, lIndex) => {
                laser.y -= laser.speed;
                if (laser.y < 0) lasers.splice(lIndex, 1);

                ctx.fillStyle = "#ff007f";
                ctx.fillRect(laser.x, laser.y, laser.width, laser.height);
            });

            // Handle incoming target asteroids
            asteroidSpawnTimer++;
            if (asteroidSpawnTimer > 40) {
                spawnAsteroid();
                asteroidSpawnTimer = 0;
            }

            asteroids.forEach((ast, aIndex) => {
                ast.y += ast.speed;
                if (ast.y > canvas.height) {
                    alert("💥 An asteroid bypassed your shields! Game Over.");
                    document.location.reload();
                }

                // Draw simple block target asteroid
                ctx.fillStyle = "#7000ff";
                ctx.fillRect(ast.x, ast.y, ast.width, ast.height);

                // Laser hitting an asteroid
                lasers.forEach((laser, lIndex) => {
                    if (checkCollision(laser, ast)) {
                        asteroids.splice(aIndex, 1);
                        lasers.splice(lIndex, 1);
                        score++;
                        scoreDisplay.textContent = score;
                    }
                });

                // Asteroid colliding directly into user ship
                if (checkCollision(player, ast)) {
                    alert("💥 Direct impact! Critical Hull Failure. Game Over.");
                    document.location.reload();
                }
            });

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
